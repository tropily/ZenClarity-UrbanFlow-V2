version: 2

snapshots:
  - name: snap_vendor
    description: "SCD Type 2 history table for vendor reference data. 
                  Tracks changes to vendor_name and status over time.
                  Each row represents one version of a vendor record."
    columns:
      - name: vendor_id
        description: "Primary key. TLC vendor identifier."
        tests:
          - not_null
      - name: vendor_name
        description: "Full legal vendor name at time of this version."
        tests:
          - not_null
      - name: status
        description: "Vendor operational status at time of this version."
        tests:
          - not_null
      - name: dbt_scd_id
        description: "Unique hash key generated by dbt for each snapshot row."
        tests:
          - not_null
          - unique
      - name: dbt_valid_from
        description: "Timestamp when this version of the record became active."
        tests:
          - not_null
      - name: dbt_valid_to
        description: "Timestamp when this version was closed. NULL means current active version."
      - name: dbt_updated_at
        description: "Timestamp when dbt last updated this row."
        tests:
          - not_null
