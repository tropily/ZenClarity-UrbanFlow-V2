version: 2

models:
  - name: dim_taxi_zone
    description: "Taxi zone dimension (one row per location)."
    columns:
      - name: location_id
        description: "Taxi zone LocationID (PK)."
        tests:
          - not_null
          - unique

  - name: dim_date
    description: "Calendar date dimension for NYC Taxi analytics."
    columns:
      - name: date_key
        description: "Primary key for the date dimension (DATE)."
        tests:
          - not_null
          - unique

  - name: fact_trip
    description: >
      Gold layer — trip fact table with pre-computed business metrics.
      Incremental model sourced from int_trip_data_core.
      Includes tip_pct, time_of_day buckets, and airport trip flag.
    columns:
      - name: trip_id
        description: "Surrogate key — inherited from int_trip_data_core."
        tests:
          - not_null
          - unique

      - name: cab_type
        tests:
          - not_null
          - accepted_values:
              arguments:
               values: ['yellow', 'green', 'fhv', 'high_volume_fhv']

      - name: pickup_datetime
        tests:
          - not_null

      - name: dropoff_datetime
        tests:
          - not_null

      - name: total_amount
        tests:
          - not_null

      - name: trip_duration_minutes
        tests:
          - not_null

      - name: ingestion_ts
        tests:
          - not_null

      - name: pickup_location_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_taxi_zone')
                field: location_id
              where: "pickup_location_id is not null"

      - name: dropoff_location_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_taxi_zone')
                field: location_id
              where: "dropoff_location_id is not null"

exposures:

      - name: streamlit_trip_dashboard
        type: dashboard
        maturity: medium
        description: >
          Live Streamlit dashboard displaying NYC Taxi KPIs.
          Tracks trip counts, total fare revenue, average trip duration,
          passengers carried, and real-time vs baseline comparisons.
        depends_on:
          - ref('fact_trip')
          - ref('dim_taxi_zone')
          - ref('dim_date')
        owner:
          name: Nguyen Le
          email: nguyen.le@zenclarity.net

      - name: quicksight_dq_report
        type: dashboard
        maturity: low
        description: >
          QuickSight operational report for data quality monitoring.
          Tracks DQ failure reasons by load date and failure category.
          Supports data stewardship and pipeline health visibility.
        depends_on:
          - ref('fact_trip')
          - ref('dq_trip_issue_summary')
        owner:
          name: Nguyen Le
          email: nguyen.le@zenclarity.net