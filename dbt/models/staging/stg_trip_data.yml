version: 2

models:
  - name: stg_trip_data
    description: "Standardized NYC Taxi trip data (Iceberg-backed), cleaned for cross-engine use. 
                  V2 — includes pipeline metadata columns for full lineage traceability."
    columns:
      - name: vendor_id
        description: "Taxi vendor ID from the raw feed."
        tests:
          - not_null

      - name: cab_type
        description: "Type of cab (yellow, green, fhv, high_volume_fhv)."
        tests:
          - not_null

      - name: pickup_datetime
        description: "Trip pickup timestamp."
        tests:
          - not_null

      - name: dropoff_datetime
        description: "Trip dropoff timestamp."
        tests:
          - not_null

      - name: pickup_location_id
        description: "Pickup Taxi Zone ID."
        tests:
          - not_null

      - name: dropoff_location_id
        description: "Dropoff Taxi Zone ID."
        tests:
          - not_null

      - name: total_amount
        description: "Total charge for the trip."
        tests:
          - not_null

      - name: ingestion_ts
        description: "Ingestion timestamp from the Iceberg pipeline."
        tests:
          - not_null

      - name: batch_id
        description: >
          Pipeline run identifier — format: {engine}#{cab_type}#{yyyy}_{mm}_{dd}#{uuid8}.
          Backfill: emr#green#2024_01_ALL#abc123.
          Delta: glue#green#2025_01_ALL#xyz789.
          Passed from Airflow DAG at runtime.
      - name: source_file
        description: "S3 path of the origin data file for lineage tracing.
          Backfill: s3://****/processed/trip_data/cab_type=cab_type/year=year/
          Delta: s3://****/raw/cab_type_tripdata_yyyy-mm.parquet"

      - name: migration_batch_id
        description: >
          Distinguishes pipeline origin.
          Backfill runs: same as batch_id.
          Delta ingestion runs: 'delta_ingestion' literal.
          Used for audit queries separating backfill vs ongoing ingestion.

      - name: engine_type
        description: >
          Engine that wrote this record.
          EMR Spark: 'EMR_7.7.0_MULTI_RES'.
          AWS Glue: 'GLUE_4.0_NETPLAY'.
          Consistent format across backfill and delta pipelines.